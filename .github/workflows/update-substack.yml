name: Update Substack Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch Substack feed
        run: python scripts/fetch_substack.py

      - name: Show generated file
        run: cat _data/substack.json

      - name: Commit updated feed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/substack.json
          git diff --cached --quiet || git commit -m "Update Substack feed data"
          git push
